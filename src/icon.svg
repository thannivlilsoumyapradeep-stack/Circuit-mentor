<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1117" />
      <stop offset="100%" stop-color="#161b22" />
    </linearGradient>
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f2fe" />
      <stop offset="100%" stop-color="#4facfe" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <circle cx="256" cy="256" r="240" fill="url(#bgGrad)" stroke="url(#glowGrad)" stroke-width="8" filter="url(#glow)" />
  <circle cx="256" cy="256" r="200" fill="none" stroke="#21262d" stroke-width="4" stroke-dasharray="10 15" />
  <!-- Circuit tracks -->
  <path d="M 120,256 L 200,256 M 312,256 L 392,256 M 256,120 L 256,200 M 256,312 L 256,392" stroke="#30363d" stroke-width="6" stroke-linecap="round" />
  <circle cx="120" cy="256" r="10" fill="#00f2fe" />
  <circle cx="392" cy="256" r="10" fill="#00f2fe" />
  <circle cx="256" cy="120" r="10" fill="#00f2fe" />
  <circle cx="256" cy="392" r="10" fill="#00f2fe" />
  <!-- Brand mark 'CM' -->
  <text x="256" y="278" font-family="'Outfit', 'Inter', sans-serif" font-size="96" font-weight="900" fill="url(#glowGrad)" text-anchor="middle" filter="url(#glow)">CM</text>
</svg>
